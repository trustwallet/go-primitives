name: Go

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Setup go
        uses: trustwallet/github-actions-proxy/actions/setup-go@main
        with:
          go-version: '1.25'
        id: go

      - name: Checkout
        uses: trustwallet/github-actions-proxy/actions/checkout@main

      - name: Test
        run: go test -race ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: trustwallet/github-actions-proxy/actions/setup-go@main
        with:
          go-version: '1.25'

      - uses: trustwallet/github-actions-proxy/actions/checkout@main
        with:
          fetch-depth: 0  # Required for only-new-issues to work correctly

      - name: Lint
        uses: trustwallet/github-actions-proxy/actions/golangci-lint-action@main
        with:
          version: v2.7
          args: --timeout=10m
          only-new-issues: true
